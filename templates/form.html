{% extends "base.html" %}

{% block title %}Form | Loop Guest House{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="h3 mb-0">Record Form</h1>
    <button class="btn btn-outline-secondary" onclick="history.back()" type="button">Back</button>
</div>

<form method="post" class="card card-body">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <button class="btn btn-outline-secondary" onclick="history.back()" type="button">Cancel</button>
    </div>
</form>
{% endblock %}
