{% extends "base.html" %}

{% block title %}Confirm Delete | Loop Guest House{% endblock %}

{% block content %}
<div class="card card-body">
    <h1 class="h4">Delete record?</h1>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
        <button class="btn btn-outline-secondary" onclick="history.back()" type="button">Cancel</button>
    </form>
</div>
{% endblock %}
