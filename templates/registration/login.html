{% extends "base.html" %}

{% block title %}Login | Loop Guest House{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-body">
            <h1 class="h3 mb-3">Staff Login</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
